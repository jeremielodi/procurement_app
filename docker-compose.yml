# docker-compose.yml

services:
  # Service PostgreSQL
  postgres:
    image: postgres:16
    container_name: wwf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wwf_procurement}
      POSTGRES_USER: ${DB_USER:-camunda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-camunda}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - wwf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-camunda} -d ${DB_NAME:-wwf_procurement}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Application Node.js
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: wwf_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-wwf_procurement}
      DB_USER: ${DB_USER:-camunda}
      DB_PASSWORD: ${DB_PASSWORD:-camunda}
      # Camunda
      CAMUNDA_URL: http://camunda:8080/engine-rest
      CAMUNDA_USERNAME: ${CAMUNDA_USERNAME:-demo}
      CAMUNDA_PASSWORD: ${CAMUNDA_PASSWORD:-demo}
      # Server
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Email
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your-email@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-your-app-password}
      SMTP_FROM: ${SMTP_FROM:-noreply@procurement.com}
      # Uploads
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "5000:5000"
    networks:
      - wwf_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

# Networks
networks:
  wwf_network:
    driver: bridge
    name: wwf_network

# Volumes
volumes:
  postgres_data:
    name: wwf_postgres_data
  uploads_data:
    name: wwf_uploads_data
  logs_data:
    name: wwf_logs_data